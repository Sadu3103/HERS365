name: CI

on:
  pull_request:
    branches: [main]

jobs:
  client:
    name: Client — build + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm run lint

  client-tests:
    name: Client — unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm test

  server-build:
    name: Server — TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  # [D-04] Fail the build if schema.ts has changed without a committed migration.
  migrations-check:
    name: Server — migrations up to date
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run db:generate
      - name: Verify no uncommitted migration
        run: |
          if [ -n "$(git status --porcelain migrations)" ]; then
            echo "::error::schema.ts changed but no migration was committed. Run 'npm run db:generate' and commit the result under server/migrations/."
            git --no-pager diff migrations
            git status --porcelain migrations
            exit 1
          fi

  server-tests:
    name: Server — tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hers365_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/hers365_test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/hers365_test
      JWT_SECRET: test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run db:migrate
      - run: npm test
